##──────────────────────────────────────────────────────────────────────────────
## MintPy Configuration File — Tĩnh Túc, Cao Bằng
## File: snap_mintpy/03_mintpy_config.cfg
##
## Tài liệu MintPy: https://mintpy.readthedocs.io
## Cài đặt: conda install -c conda-forge mintpy
##──────────────────────────────────────────────────────────────────────────────

##────────────────────────
## 1. DATASET & PROCESSOR
##────────────────────────
# Processor tạo interferograms (SNAP, ISCE, GAMMA, HyP3...)
mintpy.load.processor        = snap

# Thư mục chứa interferograms (output từ SNAP)
mintpy.load.unwFile          = ../data/processed/snap/unwrapped/*.unw.geo.tif
mintpy.load.corFile          = ../data/processed/snap/unwrapped/*.cor.geo.tif
mintpy.load.connCompFile     = auto
mintpy.load.intFile          = ../data/processed/snap/ifg/*.ifg.geo.tif

# DEM file (Copernicus 30m)
mintpy.load.demFile          = ../data/raw/dem/copernicus_dem_tinhtuc.tif

# Geometry files (từ SNAP Terrain Correction)
mintpy.load.incAngleFile     = ../data/processed/snap/geometry/incidence_angle.tif
mintpy.load.azAngleFile      = ../data/processed/snap/geometry/azimuth_angle.tif
mintpy.load.shadowMaskFile   = auto
mintpy.load.waterMaskFile    = auto

##──────────────────────────────────────────────
## 2. VÙNG NGHIÊN CỨU (subset nếu cần)
##──────────────────────────────────────────────
# Tọa độ Tĩnh Túc (WGS84)
mintpy.subset.lalo           = 22.57:22.78,105.87:106.08
mintpy.subset.yx             = auto

##──────────────────────────────────────────────
## 3. REFERENCE POINT — ĐIỂM THAM CHIẾU
##──────────────────────────────────────────────
# QUAN TRỌNG: chọn điểm ổn định, coherence cao, KHÔNG nằm trong vùng mỏ
# Gợi ý cho Tĩnh Túc: phía đông, trên núi đá granit ổn định
mintpy.reference.lalo        = 22.760,106.070   # Góc NE, xa mỏ thiếc
mintpy.reference.yx          = auto
mintpy.reference.maskFile    = auto
mintpy.reference.coherenceFile = auto
mintpy.reference.minCoherence = 0.7

##──────────────────────────────────────────────
## 4. NETWORK INVERSION — GIẢI BÀI TOÁN
##──────────────────────────────────────────────
# Phương pháp: weighted_least_squares phù hợp hơn cho vùng núi
mintpy.networkInversion.weightFunc   = var   # phương sai ngược
mintpy.networkInversion.waterMaskFile = auto
mintpy.networkInversion.minNormVelocity = yes
mintpy.networkInversion.residualNorm = L2
mintpy.networkInversion.minRedundancy = 1.0
mintpy.networkInversion.smoothingFactor = 0.01

##──────────────────────────────────────────────
## 5. TEMPORAL COHERENCE & MASKING
##──────────────────────────────────────────────
# Ngưỡng coherence — thấp hơn cho vùng rừng núi (vegetation decorrelation)
mintpy.networkInversion.minTempCoh   = 0.4
# Mask pixels có coherence thấp
mintpy.mask.threshold                = 0.4

##──────────────────────────────────────────────
## 6. TROPOSPHERIC CORRECTION — HIỆU CHỈNH KHÍ QUYỂN
##──────────────────────────────────────────────
# QUAN TRỌNG cho Tĩnh Túc: địa hình núi cao, ẩm ướt (Cao Bằng)
# Dùng ERA5 hoặc GACOS cho hiệu chỉnh tropospheric
mintpy.troposphericDelay.method       = pyaps    # pyaps dùng ERA5
# Thay thế: gacos (cần đăng ký GACOS: http://www.gacos.net)
# mintpy.troposphericDelay.method     = gacos
# mintpy.troposphericDelay.gacosDir   = ../data/ancillary/gacos/

# Phương pháp tương quan độ cao (cho vùng núi)
mintpy.troposphericDelay.polyOrder    = 1
mintpy.troposphericDelay.weatherModel = ERA5

##──────────────────────────────────────────────
## 7. DEM ERROR CORRECTION
##──────────────────────────────────────────────
mintpy.topographicResidual            = yes
mintpy.topographicResidual.polyOrder  = 2

##──────────────────────────────────────────────
## 8. DERAMPING (loại bỏ orbital ramp)
##──────────────────────────────────────────────
mintpy.deramp                         = linear   # hoặc 'quadratic' nếu cần

##──────────────────────────────────────────────
## 9. VELOCITY (kết quả chính)
##──────────────────────────────────────────────
mintpy.velocity.startDate             = 20170101
mintpy.velocity.endDate               = 20241231
mintpy.velocity.excludeDate           = auto
# Mùa mưa Cao Bằng (tháng 6–9) — có thể exclude nếu nhiều nhiễu khí quyển
# mintpy.velocity.excludeDate         = 20170601:20170930,20180601:20180930,...

##──────────────────────────────────────────────
## 10. GEOCODING
##──────────────────────────────────────────────
mintpy.geocode.laloStep               = -0.000269620,0.000274685
mintpy.geocode.SNWE                   = 22.57,22.78,105.87,106.08
mintpy.geocode.interpMethod           = nearest
mintpy.geocode.fillValue              = nan

##──────────────────────────────────────────────
## 11. GOOGLE EARTH / KMZ OUTPUT
##──────────────────────────────────────────────
mintpy.save.kmz                       = yes

##──────────────────────────────────────────────
## GHI CHÚ ĐẶC BIỆT CHO TĨNH TÚC
##──────────────────────────────────────────────
# 1. Khu vực rừng nhiệt đới = coherence thấp → dùng DS (Distributed Scatterers)
#    thay vì PS (Persistent Scatterers) thuần túy
# 2. Mỏ thiếc = nhiều PS tốt (kim loại, bê tông)
# 3. Địa hình dốc > 30° → layover/shadow trong SAR → mask cẩn thận
# 4. Mùa mưa tháng 6-9 → coherence rất thấp, xem xét exclude
# 5. L-band (ALOS-2) thay thế C-band (Sentinel-1) cho vùng rừng rậm
